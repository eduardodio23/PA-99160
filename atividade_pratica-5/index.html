<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Aposentadoria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://via.placeholder.com/150x50?text=LOGOTIPO+DA+EMPRESA" alt="Logotipo">
    </div>
    
    <h1>Verificação de Aposentadoria</h1>

    <label for="codigo">Cadastro do Empregado:</label><br>
    <input type="text" id="codigo" placeholder="Ex: 12345"><br><br>

    <label for="anoNasc">Ano de Nascimento: </label><br>
    <input type="number" id="anoNasc" placeholder="Ex: 1960"><br><br>

    <label for="tempoTrabalho">Tempo de Trabalho (em anos):</label><br>
    <input type="number" id="tempoTrabalho" placeholder="Ex: 30"><br><br>

    <button id="btnVerificar">Analisar Empregado</button>

    <div id="resultado" style="margin-top: 20px;"></div>

    <script src="script.js"></script>
</body>
</html>
