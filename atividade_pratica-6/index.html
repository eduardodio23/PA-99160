<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Notas</h1>
        <p>Insira as três notas (de 0 a 10):</p>
        
        <div class="input-group">
            <label for="nota1">Nota 1:</label>
            <input type="number" id="nota1" min="0" max="10" step="0.1" placeholder="Ex: 8.5">
        </div>
        
        <div class="input-group">
            <label for="nota2">Nota 2:</label>
            <input type="number" id="nota2" min="0" max="10" step="0.1" placeholder="Ex: 6.0">
        </div>
        
        <div class="input-group">
            <label for="nota3">Nota 3:</label>
            <input type="number" id="nota3" min="0" max="10" step="0.1" placeholder="Ex: 4.5">
        </div>
        
        <button onclick="calcularMedia()">CalcularMedia</button>
        
        <div id="resultado" class="oculto"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
