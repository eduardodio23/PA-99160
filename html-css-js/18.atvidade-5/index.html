<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <h1> Coletor de Notas </h1>
  <main>
    <div class="container">
        <label for="nomedoAluno">Digite o nome do aluno:</label>
        <input type="text" id="nomedoAluno" placeholder="digite o nome para avançar ">
        
        
        <label for="nota1">Digite a primeira nota:</label>
        <input type="number" id="nota1" placeholder="digite a nota para avançar">
        
        
        <label for="nota2">Digite a segunda nota:</label>
        <input type="number" id="nota2" placeholder="digite a nota para avançar">
        <button id="gerarBotao">Gerar Nota</button>
        
        
        
        <div id="resultadodaNota"></div>
      </div>
  </main>
      
    <script src="script.js"></script>
</body>
</html>
